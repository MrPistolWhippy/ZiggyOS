name: ZiggyOS Bare Metal Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Install x86 Cross-Compiler Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm

    - name: Clean and Prepare Directory Tree
      run: |
        # Clear out any stale artifacts before setting up our workspace files
        make clean || true
        mkdir -p src

    - name: Assemble Cloud Compilation Workspace
      run: |
        # Pull clean source code elements natively out of the tracking folder
        if [ -d "ishfiles/ziggy-kernel-os/src" ]; then
          cp -r ishfiles/ziggy-kernel-os/src/* src/ || true
        fi
        
        # Ensure the empty input/output wrapper header is in position
        touch src/io.h
        
        # Ensure any stale pre-compiled .o objects are swept out so make compiles fresh
        rm -f src/*.o *.o
        
        echo "=== Verifying Pristine Uncompiled Source Files ==="
        ls -la src/

    - name: Compile and Link Kernel Image Targets
      run: |
        # Explicitly build our target architecture binary image
        make all
