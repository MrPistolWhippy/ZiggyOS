name: ZiggyOS Bare Metal Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Install x86 Cross-Compiler Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm

    - name: Assemble Cloud Compilation Workspace
      run: |
        # Recreate the target source directory from scratch
        rm -rf src
        mkdir -p src
        
        # Pull your real original source files into focus
        if [ -d "ishfiles/ziggy-kernel-os/src" ]; then
          cp -r ishfiles/ziggy-kernel-os/src/* src/ || true
        fi
        
        # Satisfy the empty header file dependency natively
        touch src/io.h
        
        # Clean up any residual pre-compiled objects from the copy
        rm -f src/*.o *.o
        
        echo "=== Verifying Available Source Files to Build ==="
        ls -la src/

    - name: Generate Dynamic Makefile and Build
      run: |
        # Dynamically build a custom Makefile targeting all available .c files
        echo "CC = gcc" > Makefile
        echo "CFLAGS = -m32 -ffreestanding -O2 -Wall -Wextra" >> Makefile
        echo "SRCS = \$(wildcard src/*.c)" >> Makefile
        echo "OBJS = \$(SRCS:.c=.o)" >> Makefile
        echo "" >> Makefile
        echo "all: os-kernel.bin" >> Makefile
        echo "" >> Makefile
        echo "%.o: %.c" >> Makefile
        printf "\t\$(CC) \$(CFLAGS) -c \$< -o \$@\n" >> Makefile
        echo "" >> Makefile
        echo "os-kernel.bin: \$(OBJS)" >> Makefile
        printf "\tld -m elf_i386 -T linker.ld -o os-kernel.bin \$(OBJS)\n" >> Makefile
        
        echo "=== Generated Makefile ==="
        cat Makefile
        
        # Compile and link everything natively
        make all
