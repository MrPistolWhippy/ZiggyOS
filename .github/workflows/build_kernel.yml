name: ZiggyOS Bare Metal Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Install x86 Cross-Compiler Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm

    - name: Clean Previous Builds
      run: make clean || true

    - name: Compile and Link Kernel Image Targets
      run: |
        # Satisfy the empty header file dependency we added locally
        touch src/io.h
        make all
