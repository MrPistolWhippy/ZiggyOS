name: build
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Provision 32-Bit Compiler Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Execute Local Dedicated Compilation
        run: |
          make clean
          make
