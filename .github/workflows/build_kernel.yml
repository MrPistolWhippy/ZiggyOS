name: ZiggyOS Bare Metal Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Install x86 Cross-Compiler Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm

    - name: Assemble Cloud Compilation Workspace
      run: |
        # Clear out our build directory to prevent legacy conflicts
        rm -rf src
        mkdir -p src
        
        # Pull your primary production source files into focus out of kernel_core
        if [ -d "kernel_core/src" ]; then
          cp -r kernel_core/src/* src/ || true
        elif [ -d "src_fixed" ]; then
          cp -r src_fixed/* src/ || true
        fi
        
        # Ensure our input/output dependency layer is set up natively
        touch src/io.h
        
        # Clear out any stray binaries or pre-compiled objects from your local track
        rm -f src/*.o *.o *.bin
        
        echo "=== Verifying Available Production Source Files ==="
        ls -la src/

    - name: Generate Dynamic Makefile and Build
      run: |
        # Build our tab-compliant automated Makefile mapping
        echo "CC = gcc" > Makefile
        echo "CFLAGS = -m32 -ffreestanding -O2 -Wall -Wextra" >> Makefile
        echo "SRCS = \$(wildcard src/*.c)" >> Makefile
        echo "OBJS = \$(SRCS:.c=.o)" >> Makefile
        echo "" >> Makefile
        echo "all: os-kernel.bin" >> Makefile
        echo "" >> Makefile
        echo "%.o: %.c" >> Makefile
        printf "\t\$(CC) \$(CFLAGS) -c \$< -o \$@\n" >> Makefile
        echo "" >> Makefile
        echo "os-kernel.bin: \$(OBJS)" >> Makefile
        printf "\tld -m elf_i386 -T linker.ld -o os-kernel.bin \$(OBJS)\n" >> Makefile
        
        # Compile, assemble, and link the operating system image natively
        make all
