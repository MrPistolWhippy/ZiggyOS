name: ZiggyOS Bare Metal Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Install x86 Cross-Compiler Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm

    - name: Assemble Cloud Compilation Workspace
      run: |
        # Ensure target compilation directory exists
        mkdir -p src
        
        # If files are in the backup repository track, pull them directly into focus
        if [ -d "ishfiles/ziggy-kernel-os/src" ]; then
          cp -r ishfiles/ziggy-kernel-os/src/* src/ || true
        fi
        
        # Satisfy the empty header file dependency natively
        touch src/io.h
        
        # Verify the cloud workspace files are in position
        echo "=== Verifying Source Tree Files ==="
        ls -la src/

    - name: Compile and Link Kernel Image Targets
      run: |
        make clean || true
        make all
